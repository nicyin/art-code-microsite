<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tara kelton</title>
    <link rel="stylesheet" href="../../style/shared.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&display=swap">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #backlink {
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 10;
            background-color: transparent;
        }

        #backlink a {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            color: black;
            background: none;
            border: 1px solid black;
            padding: 6px 8px;
            text-decoration: none;
            display: inline-block;
        }

        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>
    <nav id="backlink">
        <a href="../../">&larr; Back to main</a>
    </nav>

    <iframe src="https://mrest.netlify.app/" allowfullscreen></iframe>
</body>

</html>
